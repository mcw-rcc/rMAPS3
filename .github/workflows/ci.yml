name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Verify LFS assets
        run: |
          git lfs version
          git lfs install
          git lfs ls-files

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Compile Python files
        run: python -m compileall -q cli.py rmaps_core legacy webui tests

      - name: CLI smoke tests
        run: python tests/smoke_cli.py

      - name: CLIP tests (SE + A5SS)
        run: python tests/test_clip.py --event se a5ss

      - name: Check motif FASTA availability
        id: motif_fasta
        run: |
          if [ -f "genomedata/hg19/hg19.fa" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Motif test (SE)
        if: steps.motif_fasta.outputs.available == 'true'
        run: python tests/test_motif.py --event se --fasta-root genomedata --genome hg19

      - name: Motif test skipped
        if: steps.motif_fasta.outputs.available != 'true'
        run: |
          echo "Skipping motif CI test: genomedata/hg19/hg19.fa not found."
